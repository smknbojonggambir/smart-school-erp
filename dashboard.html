<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SMART SCHOOL ERP 360</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h4 class="mb-0 fw-bold" style="color: var(--secondary);">ERP 360</h4>
        <small class="text-muted" id="userRoleDisplay">Memuat role...</small>
      </div>
      <ul class="list-unstyled components" id="sidebarMenu">
        <!-- Menu akan di-render oleh JS -->
      </ul>
    </nav>

    <!-- Main Content -->
    <div id="content">
      <!-- Top Navbar -->
      <div class="top-navbar">
        <button type="button" id="sidebarCollapse" class="btn btn-light shadow-sm">
          <i class="bi bi-list fs-5"></i>
        </button>
        
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-light rounded-circle shadow-sm position-relative">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
          </button>
          <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark" data-bs-toggle="dropdown">
              <img src="https://ui-avatars.com/api/?name=User&background=2563EB&color=fff" id="userAvatar" alt="Avatar" width="35" height="35" class="rounded-circle me-2">
              <span id="userNameDisplay" class="fw-medium">Memuat...</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm rounded-4 mt-2">
              <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i> Profil</a></li>
              <li><a class="dropdown-item py-2" href="#"><i class="bi bi-gear me-2"></i> Pengaturan</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger py-2" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Keluar</a></li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Dashboard Content -->
      <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold m-0">Dashboard</h3>
          <span class="text-muted" id="currentDate"></span>
        </div>

        <!-- Dynamic Widgets Container -->
        <div class="row g-4 mb-4" id="dashboardWidgets">
          <!-- Widget/Statistik di-render oleh JS -->
        </div>

        <!-- Area Konten Tambahan (Charts/Recent Activity) -->
        <div class="row g-4" id="dashboardExtra">
           <!-- Chart atau tabel akan di-render di sini -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script src="assets/js/auth.js"></script> <!-- Akses checkSession & logout -->
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
